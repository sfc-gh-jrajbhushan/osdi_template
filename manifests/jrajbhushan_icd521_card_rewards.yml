pipeline:
  name: Rewards Points Calculation
  id: a3f1c8e7-4b2d-49a6-b8e0-7d3f5a1c9e42
  owner: JRAJBHUSHAN
  team: LOB Rewards Engineering
  description: Categorize card transactions and calculate reward points per customer based on spending
  source_file: jrajbhushan_icd521_card_rewards.sql

schedule:
  frequency: daily
  time: "06:00"
  timezone: America/New_York

tables:
  - name: LOB_DB_COLLAB.LOB_REWARDS.STG_CATEGORIZED_TRANSACTIONS
    description: Approved card transactions categorized by spending type using MCC code mappings
    columns:
      - name: TRANSACTION_ID
        type: VARCHAR(36)
        description: Unique identifier for the card transaction
      - name: ACCOUNT_ID
        type: VARCHAR(16)
        description: Customer account identifier
      - name: MERCHANT_NAME
        type: VARCHAR(22)
        description: Name of the merchant
      - name: MCC_CODE
        type: VARCHAR(4)
        description: Merchant Category Code from the transaction
      - name: TRANSACTION_AMOUNT
        type: FLOAT
        description: Dollar amount of the transaction
      - name: TRANSACTION_DATE
        type: DATE
        description: Date the transaction occurred
      - name: SPENDING_CATEGORY
        type: VARCHAR(18)
        description: Derived category (Dining, Dining - Uber Eats, Grocery, Travel, Electronics, General)

  - name: LOB_DB_COLLAB.LOB_REWARDS.STG_TRANSACTION_REWARDS
    description: Transaction-level reward points calculated by joining categorized transactions with category multipliers
    columns:
      - name: TRANSACTION_ID
        type: VARCHAR(36)
        description: Unique identifier for the card transaction
      - name: ACCOUNT_ID
        type: VARCHAR(16)
        description: Customer account identifier
      - name: MERCHANT_NAME
        type: VARCHAR(22)
        description: Name of the merchant
      - name: SPENDING_CATEGORY
        type: VARCHAR(18)
        description: Spending category derived from MCC code
      - name: TRANSACTION_AMOUNT
        type: FLOAT
        description: Dollar amount of the transaction
      - name: TRANSACTION_DATE
        type: DATE
        description: Date the transaction occurred
      - name: POINTS_MULTIPLIER
        type: NUMBER(5,2)
        description: Reward multiplier for the spending category
      - name: POINTS_EARNED
        type: FLOAT
        description: Calculated reward points (amount * multiplier, rounded)

data_quality_checks:
  - id: check_null_transaction_id
    name: No null transaction IDs
    description: Ensure all categorized transactions have a non-null TRANSACTION_ID
    table: LOB_DB_COLLAB.LOB_REWARDS.STG_CATEGORIZED_TRANSACTIONS
    query: SELECT COUNT(*) FROM LOB_DB_COLLAB.LOB_REWARDS.STG_CATEGORIZED_TRANSACTIONS WHERE TRANSACTION_ID IS NULL
    severity: error
  - id: check_null_points_earned
    name: No null points earned
    description: Ensure all reward transactions have a calculated POINTS_EARNED value
    table: LOB_DB_COLLAB.LOB_REWARDS.STG_TRANSACTION_REWARDS
    query: SELECT COUNT(*) FROM LOB_DB_COLLAB.LOB_REWARDS.STG_TRANSACTION_REWARDS WHERE POINTS_EARNED IS NULL
    severity: error
  - id: check_positive_points
    name: Non-negative points earned
    description: Ensure no transactions have negative reward points
    table: LOB_DB_COLLAB.LOB_REWARDS.STG_TRANSACTION_REWARDS
    query: SELECT COUNT(*) FROM LOB_DB_COLLAB.LOB_REWARDS.STG_TRANSACTION_REWARDS WHERE POINTS_EARNED < 0
    severity: warning
  - id: check_category_coverage
    name: All categories have multipliers
    description: Ensure every spending category in categorized transactions has a matching rewards multiplier
    table: LOB_DB_COLLAB.LOB_REWARDS.STG_CATEGORIZED_TRANSACTIONS
    query: SELECT COUNT(DISTINCT ct.SPENDING_CATEGORY) FROM LOB_DB_COLLAB.LOB_REWARDS.STG_CATEGORIZED_TRANSACTIONS ct LEFT JOIN LOB_DB_COLLAB.LOB_REWARDS.REWARDS_CATEGORIES r ON ct.SPENDING_CATEGORY = r.CATEGORY_NAME WHERE r.CATEGORY_NAME IS NULL
    severity: error
